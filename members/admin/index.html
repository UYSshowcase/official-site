<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>運営メニュー | UYSshowcase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/members/_shared.css">
</head>
<body>
  <main>
    <a class="back-link" href="/members/">メンバーに戻る</a>

    <header class="app-header">
      <img class="app-logo" src="/assets/logo.png" alt="UYSshowcase">
      <div class="ribbon-title">
        <span class="ribbon-inner">ADMIN</span>
      </div>
      <p class="subtitle">運営メニュー</p>
    </header>

    <div class="section-label">登録フォーム</div>
    <section class="tiles">
      <a class="tile" href="/members/admin/schedule/">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="16" rx="2"/>
            <path d="M3 10h18M8 3v4M16 3v4M12 14v4M10 16h4"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">予定登録</div>
          <div class="tile-desc">練習・イベントの登録</div>
        </div>
      </a>

      <div class="tile" style="opacity: 0.4; pointer-events: none;">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5h16v14H4z"/>
            <path d="M8 9h8M8 13h8M8 17h5"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">お知らせ投稿</div>
          <div class="tile-desc">準備中</div>
        </div>
      </div>

      <div class="tile" style="opacity: 0.4; pointer-events: none;">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.6 7.1 18.2 8 12.7 4 8.8 9.5 8z"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">お願い登録</div>
          <div class="tile-desc">準備中</div>
        </div>
      </div>

      <div class="tile" style="opacity: 0.4; pointer-events: none;">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <path d="M7 8h10M7 12h10M7 16h6"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">経費一覧</div>
          <div class="tile-desc">準備中</div>
        </div>
      </div>
    </section>

    <div class="section-label">データ管理</div>
    <a class="tile tile-compact" target="_blank" rel="noopener"
       href="https://docs.google.com/spreadsheets/d/">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <path d="M3 10h18M9 4v16"/>
        </svg>
      </div>
      <div class="tile-body">
        <div class="tile-title">スプレッドシートを開く</div>
        <div class="tile-desc">予定・経費データの直接編集</div>
      </div>
    </a>
  </main>
</body>
</html>
