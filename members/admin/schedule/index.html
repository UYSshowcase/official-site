<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>予定登録 | UYSshowcase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #050505;
      --card: #131017;
      --text: #f5f2eb;
      --muted: #cfc7bb;
      --sub: #a79f93;
      --line: rgba(212, 181, 109, 0.34);
      --gold: #d4b56d;
      --gold-soft: rgba(212, 181, 109, 0.14);
      --purple: #7a4cb3;
      --purple-soft: rgba(122, 76, 179, 0.22);
      --error: #d93025;
      --success: #1e8e3e;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(212, 181, 109, 0.08), transparent 34%),
        linear-gradient(180deg, #0a0a0a 0%, #050505 42%, #030303 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                   "Hiragino Sans", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      min-height: 100vh;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    .app-header {
      text-align: center;
      padding: 8px 0 16px;
    }

    .app-logo {
      display: block;
      width: 70%;
      max-width: 240px;
      height: auto;
      margin: 0 auto 6px;
    }

    .app-header h1 {
      margin: 6px 0 0;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--gold);
    }

    .app-header .role {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 10px;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      border: 1px solid var(--line);
      color: var(--gold);
      border-radius: 999px;
    }

    form {
      background: var(--card);
      border: 1px solid rgba(212, 181, 109, 0.18);
      border-radius: 12px;
      padding: 20px 16px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .req {
      display: inline-block;
      background: var(--gold);
      color: #1a1a1a;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      font-weight: 600;
      vertical-align: middle;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      background: #0a080e;
      border: 1px solid rgba(212, 181, 109, 0.25);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%23d4b56d' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(212, 181, 109, 0.18);
    }

    textarea { resize: vertical; }

    /* 時刻スライダー */
    .time-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .time-row:last-child { margin-bottom: 0; }
    .time-label {
      width: 44px;
      font-size: 0.85rem;
      color: var(--sub);
      letter-spacing: 0.08em;
    }
    .time-step {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(212, 181, 109, 0.3);
      background: #0a080e;
      color: var(--gold);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-user-select: none;
      user-select: none;
    }
    .time-step:active {
      background: var(--gold-soft);
    }
    .time-display {
      flex: 1;
      min-width: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a080e;
      border: 1px solid rgba(212, 181, 109, 0.25);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
      touch-action: pan-x;
      cursor: ns-resize;
      -webkit-user-select: none;
      user-select: none;
    }
    .time-display.empty {
      color: var(--sub);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    .time-display.dragging {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(212, 181, 109, 0.18);
    }
    .time-clear {
      width: 36px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(212, 181, 109, 0.2);
      background: transparent;
      color: var(--sub);
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* カスタムカレンダー */
    .calendar {
      background: #0a080e;
      border: 1px solid rgba(212, 181, 109, 0.25);
      border-radius: 8px;
      padding: 12px;
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-title {
      font-size: 1rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .cal-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(212, 181, 109, 0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      font-size: 1rem;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-cell {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      background: transparent;
      border: none;
    }
    .cal-cell.header {
      cursor: default;
      color: var(--sub);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }
    .cal-cell.header.sun { color: #c77878; }
    .cal-cell.header.sat { color: #6f90c5; }
    .cal-cell.other-month {
      color: rgba(255, 255, 255, 0.15);
    }
    .cal-cell.sun { color: #e88a8a; }
    .cal-cell.sat { color: #8ab0e8; }
    .cal-cell.today {
      outline: 1px dashed rgba(212, 181, 109, 0.5);
    }
    .cal-cell:hover:not(.header):not(.other-month) {
      background: rgba(212, 181, 109, 0.08);
    }
    .cal-cell.selected {
      background: var(--gold);
      color: #1a1a1a;
      font-weight: 600;
    }
    .cal-selected-label {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .team-check {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #0a080e;
      border: 1px solid rgba(212, 181, 109, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .team-check input {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
      margin: 0;
    }

    .team-check:has(input:checked) {
      background: var(--gold-soft);
      border-color: var(--gold);
      color: var(--gold);
    }

    .hint {
      margin: 6px 0 0;
      font-size: 0.82rem;
      color: var(--sub);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #1a1a1a;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.08em;
      margin-top: 8px;
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(217, 48, 37, 0.15);
      border: 1px solid rgba(217, 48, 37, 0.4);
      color: #ffb4b0;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .success-screen {
      background: var(--card);
      border: 1px solid rgba(212, 181, 109, 0.18);
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      line-height: 64px;
      border-radius: 50%;
      background: var(--success);
      color: #fff;
      font-size: 2rem;
      margin: 0 auto 16px;
    }

    .success-screen h2 {
      margin: 0 0 6px;
      color: var(--gold);
      font-weight: 500;
    }

    .success-screen p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .success-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .secondary-btn {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 8px;
      color: var(--gold);
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <header class="app-header">
      <img class="app-logo" src="/assets/logo.png" alt="UYSshowcase">
      <h1>予定登録</h1>
      <span class="role">運営</span>
    </header>

    <form id="schedule-form" novalidate>
      <div id="error-box" class="error-box" hidden></div>

      <div class="field">
        <label>対象チーム <span class="req">必須</span></label>
        <div class="team-grid">
          <label class="team-check"><input type="checkbox" name="team" value="全体">全体</label>
          <label class="team-check"><input type="checkbox" name="team" value="angel">angel</label>
          <label class="team-check"><input type="checkbox" name="team" value="fairy">fairy</label>
          <label class="team-check"><input type="checkbox" name="team" value="bright">bright</label>
          <label class="team-check"><input type="checkbox" name="team" value="courage">courage</label>
          <label class="team-check"><input type="checkbox" name="team" value="glaze">glaze</label>
        </div>
        <p class="hint">全体を選択 or 何も選択しない → 全チーム表示。複数選択可(合同練習等)。</p>
      </div>

      <div class="field">
        <label>日付 <span class="req">必須</span></label>
        <div class="calendar" id="calendar">
          <div class="cal-header">
            <button type="button" class="cal-nav-btn" id="cal-prev" aria-label="前月">←</button>
            <div class="cal-title" id="cal-title">―</div>
            <button type="button" class="cal-nav-btn" id="cal-next" aria-label="次月">→</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
          <div class="cal-selected-label" id="cal-selected">未選択</div>
        </div>
        <input type="hidden" id="date" name="date">
      </div>

      <div class="field">
        <label>時刻</label>
        <div class="time-row">
          <span class="time-label">開始</span>
          <button type="button" class="time-step" data-target="start" data-step="-15" aria-label="15分前">−</button>
          <div class="time-display" id="startDisplay" data-target="start" tabindex="0">19:00</div>
          <button type="button" class="time-step" data-target="start" data-step="15" aria-label="15分後">+</button>
          <button type="button" class="time-clear" data-target="start" aria-label="クリア">×</button>
        </div>
        <div class="time-row">
          <span class="time-label">終了</span>
          <button type="button" class="time-step" data-target="end" data-step="-15" aria-label="15分前">−</button>
          <div class="time-display empty" id="endDisplay" data-target="end" tabindex="0">未設定</div>
          <button type="button" class="time-step" data-target="end" data-step="15" aria-label="15分後">+</button>
          <button type="button" class="time-clear" data-target="end" aria-label="クリア">×</button>
        </div>
        <input type="hidden" id="startTime" name="startTime" value="19:00">
        <input type="hidden" id="endTime" name="endTime" value="">
        <p class="hint">±ボタン or ドラッグ(上下)で15分単位で調整。×で未設定に。終日は両方未設定。</p>
      </div>

      <div class="field">
        <label for="title">タイトル <span class="req">必須</span></label>
        <input type="text" id="title" name="title" placeholder="例: 練習" required>
      </div>

      <div class="field">
        <label for="location">場所</label>
        <input type="text" id="location" name="location" placeholder="例: 市民体育館">
      </div>

      <div class="field">
        <label for="memo">メモ</label>
        <textarea id="memo" name="memo" rows="3" placeholder="例: 衣装持参"></textarea>
      </div>

      <div class="field">
        <label for="registrar">登録者</label>
        <input type="text" id="registrar" name="registrar" placeholder="お名前(任意)">
      </div>

      <button type="submit" id="submit-btn" class="submit-btn">登録する</button>
    </form>

    <div id="success" class="success-screen" hidden>
      <div class="success-icon">✓</div>
      <h2>登録しました</h2>
      <p id="success-msg"></p>
      <div class="success-actions">
        <button type="button" id="reset-btn" class="secondary-btn">続けて登録</button>
        <a href="../../schedule/" class="secondary-btn" style="text-decoration:none;display:inline-block;">予定一覧を見る</a>
      </div>
    </div>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx4YOxkoOk0A0nGLqcMKwL11ZUhxFdiy_wrlPgTasuuqClXIdNjFJxDoB4cXNawvW9x/exec';

    const form = document.getElementById('schedule-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');
    const success = document.getElementById('success');
    const successMsg = document.getElementById('success-msg');
    const resetBtn = document.getElementById('reset-btn');

    // --- カレンダー ---
    const calState = {
      viewYear: new Date().getFullYear(),
      viewMonth: new Date().getMonth() + 1,
      selected: toISODate(new Date()),
    };
    function toISODate(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }
    function renderCalendar() {
      const year = calState.viewYear;
      const month = calState.viewMonth;
      document.getElementById('cal-title').textContent = year + '年' + month + '月';
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      const wdNames = ['日', '月', '火', '水', '木', '金', '土'];
      wdNames.forEach(function (w, i) {
        const h = document.createElement('div');
        h.className = 'cal-cell header' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
        h.textContent = w;
        grid.appendChild(h);
      });
      const firstDay = new Date(year, month - 1, 1);
      const startWd = firstDay.getDay();
      const daysInMonth = new Date(year, month, 0).getDate();
      const prevDays = new Date(year, month - 1, 0).getDate();
      const todayIso = toISODate(new Date());

      for (let i = 0; i < startWd; i++) {
        const n = prevDays - startWd + i + 1;
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'cal-cell other-month';
        c.textContent = n;
        c.disabled = true;
        grid.appendChild(c);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = year + '-' + String(month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        const wd = new Date(year, month - 1, d).getDay();
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'cal-cell' + (wd === 0 ? ' sun' : wd === 6 ? ' sat' : '') +
          (iso === todayIso ? ' today' : '') +
          (iso === calState.selected ? ' selected' : '');
        c.textContent = d;
        c.addEventListener('click', function () { selectDate(iso); });
        grid.appendChild(c);
      }
      const totalCells = startWd + daysInMonth;
      const remain = (7 - (totalCells % 7)) % 7;
      for (let i = 0; i < remain; i++) {
        const c = document.createElement('button');
        c.type = 'button';
        c.className = 'cal-cell other-month';
        c.textContent = i + 1;
        c.disabled = true;
        grid.appendChild(c);
      }
      updateSelectedLabel();
    }
    function selectDate(iso) {
      calState.selected = iso;
      document.getElementById('date').value = iso;
      renderCalendar();
    }
    function updateSelectedLabel() {
      const iso = calState.selected;
      const d = new Date(iso + 'T00:00:00');
      const wdNames = ['日', '月', '火', '水', '木', '金', '土'];
      document.getElementById('cal-selected').textContent =
        iso ? (d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 (' + wdNames[d.getDay()] + ')') : '未選択';
    }
    document.getElementById('cal-prev').addEventListener('click', function () {
      if (calState.viewMonth === 1) { calState.viewYear--; calState.viewMonth = 12; }
      else calState.viewMonth--;
      renderCalendar();
    });
    document.getElementById('cal-next').addEventListener('click', function () {
      if (calState.viewMonth === 12) { calState.viewYear++; calState.viewMonth = 1; }
      else calState.viewMonth++;
      renderCalendar();
    });
    // 初期値を当日に
    document.getElementById('date').value = calState.selected;
    renderCalendar();

    // --- 時刻スライダー ---
    const DEFAULT_START_MIN = 19 * 60; // 19:00
    const STEP = 15;
    const MAX_MIN = 23 * 60 + 45;
    const timeState = { start: DEFAULT_START_MIN, end: null };

    function formatMin(m) {
      return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
    }
    function renderTime(target) {
      const disp = document.getElementById(target + 'Display');
      const hid = document.getElementById(target + 'Time');
      const v = timeState[target];
      if (v == null) {
        disp.textContent = '未設定';
        disp.classList.add('empty');
        hid.value = '';
      } else {
        disp.textContent = formatMin(v);
        disp.classList.remove('empty');
        hid.value = formatMin(v);
      }
    }
    function stepTime(target, delta) {
      let cur = timeState[target];
      if (cur == null) cur = target === 'start' ? DEFAULT_START_MIN : (timeState.start != null ? timeState.start + 120 : DEFAULT_START_MIN + 120);
      let next = cur + delta;
      if (next < 0) next = 0;
      if (next > MAX_MIN) next = MAX_MIN;
      timeState[target] = next;
      renderTime(target);
    }
    function clearTime(target) {
      timeState[target] = null;
      renderTime(target);
    }

    document.querySelectorAll('.time-step').forEach(function (btn) {
      btn.addEventListener('click', function () {
        stepTime(btn.dataset.target, Number(btn.dataset.step));
      });
    });
    document.querySelectorAll('.time-clear').forEach(function (btn) {
      btn.addEventListener('click', function () {
        clearTime(btn.dataset.target);
      });
    });

    // ドラッグ/スワイプで調整 (上下=±15分/20px、左右=±15分/20px どちらでも)
    document.querySelectorAll('.time-display').forEach(function (disp) {
      const target = disp.dataset.target;
      let startY = null, startX = null, startVal = null, moved = false;
      function onStart(y, x) {
        if (timeState[target] == null) {
          timeState[target] = target === 'start' ? DEFAULT_START_MIN : DEFAULT_START_MIN + 120;
          renderTime(target);
        }
        startY = y; startX = x;
        startVal = timeState[target];
        moved = false;
        disp.classList.add('dragging');
      }
      function onMove(y, x) {
        if (startY == null) return;
        const dy = startY - y;
        const dx = x - startX;
        const delta = Math.abs(dy) > Math.abs(dx) ? dy : dx;
        const steps = Math.round(delta / 20);
        if (steps === 0) return;
        moved = true;
        let next = startVal + steps * STEP;
        if (next < 0) next = 0;
        if (next > MAX_MIN) next = MAX_MIN;
        timeState[target] = next;
        renderTime(target);
      }
      function onEnd() {
        startY = null; startX = null;
        disp.classList.remove('dragging');
      }
      disp.addEventListener('touchstart', function (e) {
        const t = e.touches[0]; onStart(t.clientY, t.clientX);
      }, { passive: true });
      disp.addEventListener('touchmove', function (e) {
        const t = e.touches[0]; onMove(t.clientY, t.clientX);
      }, { passive: true });
      disp.addEventListener('touchend', onEnd);
      disp.addEventListener('mousedown', function (e) {
        onStart(e.clientY, e.clientX);
        const mm = function (ev) { onMove(ev.clientY, ev.clientX); };
        const mu = function () {
          onEnd();
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });
      // ホイール対応
      disp.addEventListener('wheel', function (e) {
        e.preventDefault();
        stepTime(target, e.deltaY < 0 ? STEP : -STEP);
      }, { passive: false });
      // キーボード
      disp.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { e.preventDefault(); stepTime(target, STEP); }
        else if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { e.preventDefault(); stepTime(target, -STEP); }
      });
    });

    renderTime('start');
    renderTime('end');

    // 登録者名の記憶
    const savedRegistrar = localStorage.getItem('uys.schedule.registrar');
    if (savedRegistrar) document.getElementById('registrar').value = savedRegistrar;

    form.addEventListener('submit', onSubmit);
    resetBtn.addEventListener('click', resetToForm);

    function onSubmit(e) {
      e.preventDefault();
      hideError();

      const teams = Array.from(document.querySelectorAll('input[name="team"]:checked'))
        .map(function (el) { return el.value; });
      const date = document.getElementById('date').value;
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      const title = document.getElementById('title').value.trim();
      const location = document.getElementById('location').value.trim();
      const memo = document.getElementById('memo').value.trim();
      const registrar = document.getElementById('registrar').value.trim();

      const err = validate({ date, title, startTime, endTime });
      if (err) return showError(err);

      if (registrar) localStorage.setItem('uys.schedule.registrar', registrar);

      setSubmitting(true);

      const body = JSON.stringify({
        action: 'createSchedule',
        payload: { teams, date, startTime, endTime, title, location, memo, registrar },
      });

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: body,
      })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          setSubmitting(false);
          if (!res.ok) throw new Error(res.error || '登録に失敗しました');
          showSuccess(title, date);
        })
        .catch(function (err) {
          setSubmitting(false);
          showError(err.message || '登録に失敗しました');
        });
    }

    function validate(v) {
      if (!v.date) return '日付を入力してください。';
      if (!v.title) return 'タイトルを入力してください。';
      if (v.startTime && v.endTime && v.startTime >= v.endTime) {
        return '終了時刻は開始時刻より後にしてください。';
      }
      return null;
    }

    function setSubmitting(s) {
      submitBtn.disabled = s;
      submitBtn.textContent = s ? '送信中…' : '登録する';
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.hidden = false;
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function hideError() {
      errorBox.hidden = true;
      errorBox.textContent = '';
    }

    function showSuccess(title, date) {
      successMsg.textContent = date + ' 「' + title + '」を登録しました。';
      form.hidden = true;
      success.hidden = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetToForm() {
      form.reset();
      // カレンダー・日付を当日に戻す
      const today = new Date();
      calState.viewYear = today.getFullYear();
      calState.viewMonth = today.getMonth() + 1;
      calState.selected = toISODate(today);
      document.getElementById('date').value = calState.selected;
      renderCalendar();
      // 時刻をデフォルトに戻す
      timeState.start = DEFAULT_START_MIN;
      timeState.end = null;
      renderTime('start');
      renderTime('end');
      // 登録者は残す
      const r = localStorage.getItem('uys.schedule.registrar');
      if (r) document.getElementById('registrar').value = r;
      hideError();
      form.hidden = false;
      success.hidden = true;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
