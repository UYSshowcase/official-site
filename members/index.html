<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>メンバー | UYSshowcase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/members/_shared.css">
</head>
<body>
  <main>
    <header class="app-header">
      <img class="app-logo" src="/assets/logo.png" alt="UYSshowcase">
      <div class="ribbon-title">
        <span class="ribbon-inner">MEMBERS</span>
      </div>
      <p class="subtitle">メンバー専用ページ</p>
    </header>

    <section class="tiles">
      <a class="tile" href="/members/schedule/">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="16" rx="2"/>
            <path d="M3 10h18M8 3v4M16 3v4"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">予定</div>
          <div class="tile-desc">練習・イベントのスケジュール</div>
        </div>
      </a>

      <a class="tile" href="/members/news/">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5h16v14H4z"/>
            <path d="M8 9h8M8 13h8M8 17h5"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">お知らせ</div>
          <div class="tile-desc">運営からの連絡事項</div>
        </div>
      </a>

      <a class="tile" href="/members/expense/">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7h18v12H3z"/>
            <path d="M3 11h18M7 15h3"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">経費精算</div>
          <div class="tile-desc">立替金の申請</div>
        </div>
      </a>

      <a class="tile" href="/members/request/">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.6 7.1 18.2 8 12.7 4 8.8 9.5 8z"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">お願い</div>
          <div class="tile-desc">衣装・持ち物の依頼</div>
        </div>
      </a>
    </section>

    <section class="admin-section">
      <div class="section-label">運営用</div>
      <a class="tile tile-compact" href="/members/admin/">
        <div class="tile-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 01-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 01-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 010-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h.1a1.7 1.7 0 001-1.5V3a2 2 0 014 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v.1a1.7 1.7 0 001.5 1H21a2 2 0 010 4h-.1a1.7 1.7 0 00-1.5 1z"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">運営メニュー</div>
          <div class="tile-desc">予定登録など</div>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
